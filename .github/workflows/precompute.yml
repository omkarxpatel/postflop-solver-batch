name: precompute

on:
  workflow_dispatch:

jobs:
  solve:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix:
        include:
          # line 0: HU SPR 3
          - { line: 0, chunk: 0, of: 3 }
          - { line: 0, chunk: 1, of: 3 }
          - { line: 0, chunk: 2, of: 3 }
          # line 1: HU SPR 5
          - { line: 1, chunk: 0, of: 4 }
          - { line: 1, chunk: 1, of: 4 }
          - { line: 1, chunk: 2, of: 4 }
          - { line: 1, chunk: 3, of: 4 }
          # line 2: HU SPR 8
          - { line: 2, chunk: 0, of: 6 }
          - { line: 2, chunk: 1, of: 6 }
          - { line: 2, chunk: 2, of: 6 }
          - { line: 2, chunk: 3, of: 6 }
          - { line: 2, chunk: 4, of: 6 }
          - { line: 2, chunk: 5, of: 6 }
          # line 3: HU SPR 12
          - { line: 3, chunk: 0, of: 8 }
          - { line: 3, chunk: 1, of: 8 }
          - { line: 3, chunk: 2, of: 8 }
          - { line: 3, chunk: 3, of: 8 }
          - { line: 3, chunk: 4, of: 8 }
          - { line: 3, chunk: 5, of: 8 }
          - { line: 3, chunk: 6, of: 8 }
          - { line: 3, chunk: 7, of: 8 }
          # line 4: HU 3-bet SPR 4
          - { line: 4, chunk: 0, of: 3 }
          - { line: 4, chunk: 1, of: 3 }
          - { line: 4, chunk: 2, of: 3 }
          # line 5: HU limped SPR 15
          - { line: 5, chunk: 0, of: 8 }
          - { line: 5, chunk: 1, of: 8 }
          - { line: 5, chunk: 2, of: 8 }
          - { line: 5, chunk: 3, of: 8 }
          - { line: 5, chunk: 4, of: 8 }
          - { line: 5, chunk: 5, of: 8 }
          - { line: 5, chunk: 6, of: 8 }
          - { line: 5, chunk: 7, of: 8 }
          # line 6: SRP BTN@15
          - { line: 6, chunk: 0, of: 2 }
          - { line: 6, chunk: 1, of: 2 }
          # line 7: SRP BTN@8
          - { line: 7, chunk: 0, of: 2 }
          - { line: 7, chunk: 1, of: 2 }
          # line 8: SRP CO@15
          - { line: 8, chunk: 0, of: 2 }
          - { line: 8, chunk: 1, of: 2 }
          # line 9: SRP CO@8
          - { line: 9, chunk: 0, of: 2 }
          - { line: 9, chunk: 1, of: 2 }
          # line 10: SRP MP@15
          - { line: 10, chunk: 0, of: 2 }
          - { line: 10, chunk: 1, of: 2 }
          # line 11: SRP MP@8
          - { line: 11, chunk: 0, of: 2 }
          - { line: 11, chunk: 1, of: 2 }
          # line 12: SRP EP@15
          - { line: 12, chunk: 0, of: 2 }
          - { line: 12, chunk: 1, of: 2 }
          # line 13: SRP EP@8
          - { line: 13, chunk: 0, of: 2 }
          - { line: 13, chunk: 1, of: 2 }
          # line 14: SRP SB@15
          - { line: 14, chunk: 0, of: 2 }
          - { line: 14, chunk: 1, of: 2 }
          # line 15: SRP SB@8
          - { line: 15, chunk: 0, of: 2 }
          - { line: 15, chunk: 1, of: 2 }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: solver
      - name: Build
        run: cargo build --release
      - name: Solve chunk
        env:
          WIZGTO_CACHE_DIR: cache-out
        # Stop ~35 min before the job cap so partial results still upload;
        # the batch is resumable, a re-run picks up whatever is missing.
        run: |
          timeout -k 60 18900 ./target/release/wizgto-solver precompute cache-config.json \
            --line ${{ matrix.line }} --chunk ${{ matrix.chunk }}/${{ matrix.of }} || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cache-line${{ matrix.line }}-chunk${{ matrix.chunk }}
          path: cache-out/*.json
          if-no-files-found: warn
